<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scan</title>
<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
}
canvas {
  display: block;
}
</style>
</head>
<body>

<video id="video" autoplay playsinline style="display:none;"></video>
<canvas id="canvas"></canvas>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// Получаем камеру
navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
.then(stream => {
  video.srcObject = stream;
  video.play();
})
.catch(err => {
  alert("Camera access denied");
});

// Фильтр для пикселей
function applyFilter(r, g, b) {
  const factor = 1.2; // контраст
  r = Math.min(255, r * factor + 30); 
  g = Math.min(255, g * factor); 
  b = Math.min(255, b * factor - 20); 
  return [r, g, b];
}

// Основная функция рисования
function draw() {
  const scale = 40; // базовый размер пикселя
  const vw = video.videoWidth;
  const vh = video.videoHeight;

  if (vw === 0 || vh === 0) {
    requestAnimationFrame(draw);
    return;
  }

  const cw = window.innerWidth;
  const ch = window.innerHeight;

  canvas.width = cw;
  canvas.height = ch;

  const aspectVideo = vw / vh;
  const aspectCanvas = cw / ch;

  let drawWidth, drawHeight;
  if (aspectCanvas > aspectVideo) {
    drawHeight = ch;
    drawWidth = ch * aspectVideo;
  } else {
    drawWidth = cw;
    drawHeight = cw / aspectVideo;
  }

  const tempCanvas = document.createElement('canvas');
  tempCanvas.width = drawWidth / scale;
  tempCanvas.height = drawHeight / scale;
  const tempCtx = tempCanvas.getContext('2d');

  tempCtx.save();
  tempCtx.translate(tempCanvas.width, 0);
  tempCtx.scale(-1, 1);
  tempCtx.drawImage(video, 0, 0, tempCanvas.width, tempCanvas.height);
  tempCtx.restore();

  const imageData = tempCtx.getImageData(0, 0, tempCanvas.width, tempCanvas.height);

  ctx.clearRect(0, 0, cw, ch);

  const offsetX = (cw - drawWidth) / 2;
  const offsetY = (ch - drawHeight) / 2;

  // зоны: центр - детальная, боковые - крупные квадраты
  const centerWidth = drawWidth * 0.5;
  const sideWidth = (drawWidth - centerWidth) / 2;

  for (let y = 0; y < tempCanvas.height; y++) {
    for (let x = 0; x < tempCanvas.width; x++) {
      const i = (y * tempCanvas.width + x) * 4;
      const r = imageData.data[i];
      const g = imageData.data[i + 1];
      const b = imageData.data[i + 2];

      let blockSize;
      let fillStyle;

      // Определяем, центр или боковая зона
      if (x * scale > sideWidth && x * scale < sideWidth + centerWidth) {
        // центр: применяем фильтр
        blockSize = scale;
        const [fr, fg, fb] = applyFilter(r, g, b);
        fillStyle = `rgb(${fr},${fg},${fb})`;
      } else {
        // боковые зоны: крупные квадраты, случайные цвета для «мозаики/QR»
        blockSize = scale * 2;
        fillStyle = Math.random() > 0.5 ? "#000" : "#fff";
      }

      ctx.fillStyle = fillStyle;
      ctx.fillRect(offsetX + x * blockSize, offsetY + y * blockSize, blockSize, blockSize);
    }
  }

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>

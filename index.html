<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scan</title>
<style>
body { margin:0; background:black; overflow:hidden; }
canvas { display:block; width:100vw; height:100vh; }
video { display:none; }
</style>
</head>
<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// Настройка камеры
navigator.mediaDevices.getUserMedia({
    video: { facingMode: "user" } // фронтальная камера
})
.then(stream => {
    video.srcObject = stream;
    return video.play();
})
.catch(err => alert("Camera access denied"));

// Размер пикселей (безопасный диапазон: 20-80)
let scale = 40;

function draw() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let w = Math.floor(canvas.width / scale);
    let h = Math.floor(canvas.height / scale);

    // Снимаем кадр с видео в маленьком разрешении
    ctx.drawImage(video, 0, 0, w, h);
    const imageData = ctx.getImageData(0, 0, w, h);

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Переворачиваем колонки, чтобы убрать зеркалирование
    for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
            const i = (y * w + x) * 4;
            const r = imageData.data[i];
            const g = imageData.data[i + 1];
            const b = imageData.data[i + 2];

            ctx.fillStyle = `rgb(${r},${g},${b})`;
            ctx.fillRect((w - 1 - x) * scale, y * scale, scale, scale);
        }
    }

    requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>

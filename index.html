<canvas id="canvas"></canvas>
<video id="video" autoplay playsinline style="display:none;"></video>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
.then(stream => {
  video.srcObject = stream;
  video.play();
})
.catch(err => {
  alert("Camera access denied");
});

function draw() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  let scale = 50; // размер пикселей

  let w = canvas.width / scale;
  let h = canvas.height / scale;

  // Рисуем без зеркалирования
  ctx.save();                     // сохраняем текущие настройки
  ctx.scale(-1, 1);               // переворачиваем по горизонтали
  ctx.drawImage(video, -w, 0, w, h); // смещаем влево на -w, чтобы корректно отобразить
  ctx.restore();                  // восстанавливаем настройки

  let imageData = ctx.getImageData(0, 0, w, h);
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      let i = (y * w + x) * 4;
      let r = imageData.data[i];
      let g = imageData.data[i + 1];
      let b = imageData.data[i + 2];

      ctx.fillStyle = `rgb(${r},${g},${b})`;
      ctx.fillRect(x * scale, y * scale, scale, scale);
    }
  }

  requestAnimationFrame(draw);
}

draw();
</script>
